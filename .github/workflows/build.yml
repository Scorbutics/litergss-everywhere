name: Build LiteRGSS

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated)"
        required: false
        default: "android,linux-x86_64,ios,macos"
        type: choice
        options:
          - "android,linux-x86_64,ios,macos"
          - "android,linux-x86_64,ios"
          - "android,linux-x86_64"
          - "android"
          - "linux-x86_64"
          - "linux-arm64"
          - "ios"
          - "macos"
          - "android,linux-x86_64,linux-arm64"
          - "android,linux-x86_64,linux-arm64,ios,macos"
      android_abis:
        description: "Android ABIs to include in the AAR (comma-separated)"
        required: false
        default: "arm64-v8a,x86_64"
        type: choice
        options:
          - "arm64-v8a,x86_64"
          - "arm64-v8a"
          - "x86_64"
      build_type:
        description: "Build type"
        required: false
        default: "release"
        type: choice
        options:
          - "release"
          - "debug"

# Build-wide defaults when triggered by push/PR (not workflow_dispatch)
env:
  DEFAULT_PLATFORMS: "android,linux-x86_64,ios,macos"
  DEFAULT_ANDROID_ABIS: "arm64-v8a,x86_64"
  DEFAULT_BUILD_TYPE: "release"

jobs:
  # ---------------------------------------------------------------------------
  # Compute build parameters from inputs (or defaults for push/PR triggers)
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_type_flag: ${{ steps.set-params.outputs.build_type_flag }}
      has_android: ${{ steps.set-params.outputs.has_android }}
      has_linux_x86_64: ${{ steps.set-params.outputs.has_linux_x86_64 }}
      has_ios: ${{ steps.set-params.outputs.has_ios }}
      has_macos: ${{ steps.set-params.outputs.has_macos }}
      is_release: ${{ steps.set-params.outputs.is_release }}
      version: ${{ steps.set-params.outputs.version }}
      android_abis: ${{ steps.set-params.outputs.android_abis }}
      android_abis_json: ${{ steps.set-params.outputs.android_abis_json }}
      android_toolchain_args: ${{ steps.set-params.outputs.android_toolchain_args }}
      ios_targets_json: ${{ steps.set-params.outputs.ios_targets_json }}
    steps:
      - id: set-params
        shell: bash
        run: |
          # Determine if this is a release (tag push)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            VERSION="1.0.0-SNAPSHOT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          PLATFORMS="${{ github.event.inputs.platforms || env.DEFAULT_PLATFORMS }}"
          ANDROID_ABIS="${{ github.event.inputs.android_abis || env.DEFAULT_ANDROID_ABIS }}"
          BUILD_TYPE="${{ github.event.inputs.build_type || env.DEFAULT_BUILD_TYPE }}"

          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "build_type_flag=--enable-debug" >> "$GITHUB_OUTPUT"
          else
            echo "build_type_flag=--enable-release" >> "$GITHUB_OUTPUT"
          fi

          echo "android_abis=$ANDROID_ABIS" >> "$GITHUB_OUTPUT"

          # Convert comma-separated ABIs to JSON array for matrix strategy
          ABIS_JSON=$(echo "$ANDROID_ABIS" | jq -Rc 'split(",") | map(ltrimstr(" ") | rtrimstr(" "))')
          echo "android_abis_json=$ABIS_JSON" >> "$GITHUB_OUTPUT"

          # iOS always builds device + simulator
          echo 'ios_targets_json=["arm64-ios-device","arm64-ios-simulator"]' >> "$GITHUB_OUTPUT"

          # Build Android toolchain args
          TOOLCHAIN_ARGS=""
          IFS=',' read -ra ABIS <<< "$ANDROID_ABIS"
          for abi in "${ABIS[@]}"; do
            abi=$(echo "$abi" | xargs)
            TOOLCHAIN_ARGS+=" --with-toolchain-params=toolchain-params/${abi}-android-toolchain.params"
          done
          echo "android_toolchain_args=$TOOLCHAIN_ARGS" >> "$GITHUB_OUTPUT"

          # Export platform presence flags
          echo "has_android=false" >> "$GITHUB_OUTPUT"
          echo "has_linux_x86_64=false" >> "$GITHUB_OUTPUT"
          echo "has_ios=false" >> "$GITHUB_OUTPUT"
          echo "has_macos=false" >> "$GITHUB_OUTPUT"
          IFS=',' read -ra PLATS <<< "$PLATFORMS"
          for plat in "${PLATS[@]}"; do
            plat=$(echo "$plat" | xargs)
            case "$plat" in
              android)        echo "has_android=true" >> "$GITHUB_OUTPUT" ;;
              linux-x86_64)   echo "has_linux_x86_64=true" >> "$GITHUB_OUTPUT" ;;
              ios)            echo "has_ios=true" >> "$GITHUB_OUTPUT" ;;
              macos)          echo "has_macos=true" >> "$GITHUB_OUTPUT" ;;
            esac
          done

  # ===========================================================================
  #  BUILD PHASE — configure + make build (parallel across platforms)
  # ===========================================================================

  # --- Android (Docker, parallel per ABI) ---
  build-android:
    needs: prepare
    if: needs.prepare.outputs.has_android == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: ${{ fromJson(needs.prepare.outputs.android_abis_json) }}
    name: Build Android (${{ matrix.abi }})
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies (URL tarballs)
        uses: actions/cache@v4
        with:
          path: build-android/downloads
          key: deps-url-android-${{ matrix.abi }}-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}-v5
          restore-keys: |
            deps-url-android-${{ matrix.abi }}-
            deps-url-android-

      - name: Cache dependencies (git repos)
        uses: actions/cache@v4
        with:
          path: build-android/git-cache
          key: deps-git-android-${{ matrix.abi }}-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}
          restore-keys: |
            deps-git-android-${{ matrix.abi }}-
            deps-git-android-

      - name: Pre-download dependencies
        run: |
          cmake \
            -DDEPS_DIR=${{ github.workspace }}/cmake/litergss-app/dependencies \
            -DDOWNLOAD_DIR=${{ github.workspace }}/build-android/downloads \
            -DGIT_CACHE_DIR=${{ github.workspace }}/build-android/git-cache \
            -P cmake/docker/PreloadDeps.cmake

      - name: Configure
        run: |
          ./configure \
            --with-toolchain-params=toolchain-params/${{ matrix.abi }}-android-toolchain.params \
            --build-dir=build-android \
            --target-dir=target-android \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Build
        run: make build

      - name: Export build outputs
        run: make export

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-android-${{ matrix.abi }}
          path: target-android/
          if-no-files-found: error
          retention-days: 1

  # --- Linux x86_64 (local) ---
  build-linux-x86_64:
    needs: prepare
    if: needs.prepare.outputs.has_linux_x86_64 == 'true'
    runs-on: ubuntu-latest
    name: Build Linux x86_64
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies (URL tarballs)
        uses: actions/cache@v4
        with:
          path: build-linux-x86_64/downloads
          key: deps-url-linux-x86_64-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}-v5
          restore-keys: deps-url-linux-x86_64-

      - name: Cache dependencies (git repos)
        uses: actions/cache@v4
        with:
          path: build-linux-x86_64/git-cache
          key: deps-git-linux-x86_64-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}
          restore-keys: deps-git-linux-x86_64-

      - name: Pre-download dependencies
        run: |
          cmake \
            -DDEPS_DIR=${{ github.workspace }}/cmake/litergss-app/dependencies \
            -DDOWNLOAD_DIR=${{ github.workspace }}/build-linux-x86_64/downloads \
            -DGIT_CACHE_DIR=${{ github.workspace }}/build-linux-x86_64/git-cache \
            -P cmake/docker/PreloadDeps.cmake

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ruby-dev ninja-build \
            libtool autoconf automake libncurses-dev \
            zip unzip wget gettext patch \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libudev-dev pkg-config

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/x86_64-linux-toolchain.params \
            --build-dir=build-linux-x86_64 \
            --target-dir=target-linux-x86_64 \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Export build outputs
        run: make export

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-x86_64
          path: target-linux-x86_64/
          if-no-files-found: error
          retention-days: 1

  # --- iOS (macOS, parallel per target) ---
  build-ios:
    needs: prepare
    if: needs.prepare.outputs.has_ios == 'true'
    runs-on: macos-14
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.ios_targets_json) }}
    name: Build iOS (${{ matrix.target }})
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies (URL tarballs)
        uses: actions/cache@v4
        with:
          path: build-ios/downloads
          key: deps-url-ios-${{ matrix.target }}-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}-v5
          restore-keys: |
            deps-url-ios-${{ matrix.target }}-
            deps-url-ios-

      - name: Cache dependencies (git repos)
        uses: actions/cache@v4
        with:
          path: build-ios/git-cache
          key: deps-git-ios-${{ matrix.target }}-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}
          restore-keys: |
            deps-git-ios-${{ matrix.target }}-
            deps-git-ios-

      - name: Pre-download dependencies
        run: |
          cmake \
            -DDEPS_DIR=${{ github.workspace }}/cmake/litergss-app/dependencies \
            -DDOWNLOAD_DIR=${{ github.workspace }}/build-ios/downloads \
            -DGIT_CACHE_DIR=${{ github.workspace }}/build-ios/git-cache \
            -P cmake/docker/PreloadDeps.cmake

      - name: Install build dependencies
        run: |
          brew install autoconf automake libtool cmake
          echo "Xcode version:"
          xcodebuild -version
          echo "iOS SDK path:"
          xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "(not available)"
          echo "iOS Simulator SDK path:"
          xcrun --sdk iphonesimulator --show-sdk-path 2>/dev/null || echo "(not available)"

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/${{ matrix.target }}-toolchain.params \
            --enable-static \
            --build-dir=build-ios \
            --target-dir=target-ios \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Build
        run: make build

      - name: Export build outputs
        run: make export

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-ios-${{ matrix.target }}
          path: target-ios/
          if-no-files-found: error
          retention-days: 1

  # --- macOS ARM64 (local) ---
  build-macos:
    needs: prepare
    if: needs.prepare.outputs.has_macos == 'true'
    runs-on: macos-14
    name: Build macOS arm64
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache dependencies (URL tarballs)
        uses: actions/cache@v4
        with:
          path: build-macos/downloads
          key: deps-url-macos-arm64-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}-v5
          restore-keys: deps-url-macos-arm64-

      - name: Cache dependencies (git repos)
        uses: actions/cache@v4
        with:
          path: build-macos/git-cache
          key: deps-git-macos-arm64-${{ hashFiles('cmake/litergss-app/dependencies/*.cmake') }}
          restore-keys: deps-git-macos-arm64-

      - name: Pre-download dependencies
        run: |
          cmake \
            -DDEPS_DIR=${{ github.workspace }}/cmake/litergss-app/dependencies \
            -DDOWNLOAD_DIR=${{ github.workspace }}/build-macos/downloads \
            -DGIT_CACHE_DIR=${{ github.workspace }}/build-macos/git-cache \
            -P cmake/docker/PreloadDeps.cmake

      - name: Install build dependencies
        run: brew install autoconf automake libtool cmake

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/arm64-macos-toolchain.params \
            --enable-static \
            --build-dir=build-macos \
            --target-dir=target-macos \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Build
        run: make build

      - name: Export build outputs
        run: make export

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-arm64
          path: target-macos/
          if-no-files-found: error
          retention-days: 1

  # ===========================================================================
  #  INSTALL PHASE — publish KMP artifacts (each depends on its build)
  # ===========================================================================

  # --- Install Android: merge ABIs + build .so wrappers + publish AAR ---
  install-android:
    needs: [prepare, build-android]
    if: needs.prepare.outputs.has_android == 'true'
    runs-on: ubuntu-latest
    name: Install Android
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download per-ABI build outputs
        uses: actions/download-artifact@v4
        with:
          pattern: build-android-*
          path: build-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            ${{ needs.prepare.outputs.android_toolchain_args }} \
            --build-dir=build-android \
            --target-dir=target-android \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Merge ABI exports
        run: |
          MERGE_SOURCES=""
          for dir in build-artifacts/build-android-*/; do
            [ -d "$dir" ] || continue
            MERGE_SOURCES="$MERGE_SOURCES $dir"
          done
          make merge-exports MERGE_SOURCES="$MERGE_SOURCES"

      - name: Publish
        run: make publish-kmp

      - name: Find AAR artifact
        id: find-aar
        run: |
          AAR_PATH=$(find target-android/maven -name '*.aar' 2>/dev/null | head -1)
          if [ -z "$AAR_PATH" ]; then
            echo "ERROR: No AAR file found in target-android/maven"
            exit 1
          fi
          echo "aar_path=$AAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Found AAR: $AAR_PATH"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: intermediate-android
          path: ${{ steps.find-aar.outputs.aar_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload Maven repo
        uses: actions/upload-artifact@v4
        with:
          name: intermediate-android-maven
          path: target-android/maven/
          if-no-files-found: warn
          retention-days: 1

  # --- Install Linux x86_64: build .so wrapper + publish Desktop JAR + Linux Native klib ---
  install-linux-x86_64:
    needs: [prepare, build-linux-x86_64]
    if: needs.prepare.outputs.has_linux_x86_64 == 'true'
    runs-on: ubuntu-latest
    name: Install Linux x86_64
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-linux-x86_64
          path: target-linux-x86_64

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libudev-dev pkg-config

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/x86_64-linux-toolchain.params \
            --build-dir=build-linux-x86_64 \
            --target-dir=target-linux-x86_64 \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Publish
        run: make publish-kmp

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intermediate-linux-x86_64
          path: target-linux-x86_64/
          if-no-files-found: error
          retention-days: 1

  # --- Install iOS: merge targets + build XCFramework ---
  install-ios:
    needs: [prepare, build-ios]
    if: needs.prepare.outputs.has_ios == 'true'
    runs-on: macos-14
    name: Install iOS
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download per-target build outputs
        uses: actions/download-artifact@v4
        with:
          pattern: build-ios-*
          path: build-artifacts

      - name: Install build dependencies
        run: brew install autoconf automake libtool cmake

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/arm64-ios-device-toolchain.params \
            --with-toolchain-params=toolchain-params/arm64-ios-simulator-toolchain.params \
            --enable-static \
            --build-dir=build-ios \
            --target-dir=target-ios \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Merge target exports
        run: |
          MERGE_SOURCES=""
          for dir in build-artifacts/build-ios-*/; do
            [ -d "$dir" ] || continue
            MERGE_SOURCES="$MERGE_SOURCES $dir"
          done
          make merge-exports MERGE_SOURCES="$MERGE_SOURCES"

      - name: Publish
        run: make publish-kmp

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intermediate-ios
          path: target-ios/
          if-no-files-found: error
          retention-days: 1

  # --- Install macOS: build .dylib wrapper + publish Desktop JAR ---
  install-macos:
    needs: [prepare, build-macos]
    if: needs.prepare.outputs.has_macos == 'true'
    runs-on: macos-14
    name: Install macOS arm64
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-macos-arm64
          path: target-macos

      - name: Install build dependencies
        run: brew install autoconf automake libtool cmake

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure
        run: |
          ./configure \
            --without-docker \
            --with-toolchain-params=toolchain-params/arm64-macos-toolchain.params \
            --enable-static \
            --build-dir=build-macos \
            --target-dir=target-macos \
            ${{ needs.prepare.outputs.build_type_flag }}

      - name: Publish
        run: make publish-kmp

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intermediate-macos
          path: target-macos/
          if-no-files-found: error
          retention-days: 1

  # ===========================================================================
  #  PACKAGE — assemble final release from all platform outputs
  # ===========================================================================
  package:
    needs: [prepare, install-android, install-linux-x86_64, install-ios, install-macos]
    if: >-
      always()
      && (needs.install-android.result == 'success' || needs.install-android.result == 'skipped')
      && (needs.install-linux-x86_64.result == 'success' || needs.install-linux-x86_64.result == 'skipped')
      && (needs.install-ios.result == 'success' || needs.install-ios.result == 'skipped')
      && (needs.install-macos.result == 'success' || needs.install-macos.result == 'skipped')
      && (needs.install-android.result == 'success' || needs.install-linux-x86_64.result == 'success' || needs.install-ios.result == 'success' || needs.install-macos.result == 'success')
    runs-on: ubuntu-latest
    name: Package final artifacts
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download Android AAR
        if: needs.prepare.outputs.has_android == 'true'
        uses: actions/download-artifact@v4
        with:
          name: intermediate-android
          path: staging/android

      - name: Download Android Maven repo
        if: needs.prepare.outputs.has_android == 'true'
        uses: actions/download-artifact@v4
        with:
          name: intermediate-android-maven
          path: staging/android-maven

      - name: Download Linux x86_64 build
        if: needs.prepare.outputs.has_linux_x86_64 == 'true'
        uses: actions/download-artifact@v4
        with:
          name: intermediate-linux-x86_64
          path: staging/linux-x86_64

      - name: Download iOS build
        if: needs.prepare.outputs.has_ios == 'true'
        uses: actions/download-artifact@v4
        with:
          name: intermediate-ios
          path: staging/ios

      - name: Download macOS build
        if: needs.prepare.outputs.has_macos == 'true'
        uses: actions/download-artifact@v4
        with:
          name: intermediate-macos
          path: staging/macos

      - name: Assemble release
        run: |
          mkdir -p release
          if [ -d staging/android ]; then
            mkdir -p release/android
            cp staging/android/*.aar release/android/
            echo "Included Android AAR:"
            ls -lh release/android/
          fi
          if [ -d staging/linux-x86_64 ]; then
            mkdir -p release/linux-x86_64
            cp -r staging/linux-x86_64/* release/linux-x86_64/
            echo "Included Linux x86_64 artifacts:"
            ls -lh release/linux-x86_64/
          fi
          if [ -d staging/ios ]; then
            mkdir -p release/ios
            # Copy build archives (flat, from both device + simulator ABIs)
            find staging/ios -maxdepth 1 -type f -exec cp {} release/ios/ \;
            echo "Included iOS artifacts:"
            ls -lh release/ios/ 2>/dev/null || true
            # Copy XCFramework if present
            if [ -d staging/ios/xcframework ]; then
              mkdir -p release/xcframework
              cp -r staging/ios/xcframework/* release/xcframework/
              echo "Included iOS XCFramework:"
              find release/xcframework -type f | head -20
            fi
          fi
          if [ -d staging/macos ]; then
            mkdir -p release/macos
            cp -r staging/macos/* release/macos/
            echo "Included macOS artifacts:"
            ls -lh release/macos/
          fi
          echo ""
          echo "=== Final release contents ==="
          find release -type f | sort

      - name: Upload final release artifact
        uses: actions/upload-artifact@v4
        with:
          name: litergss-release
          path: release/
          if-no-files-found: error
          retention-days: 30

      # --- GitHub Release (only on tag pushes) ---

      - name: Assemble release archives
        if: needs.prepare.outputs.is_release == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release-assets

          if [ -d staging/android ]; then
            for aar in staging/android/*.aar; do
              BASENAME=$(basename "$aar" .aar)
              cp "$aar" "release-assets/${BASENAME}-${VERSION}.aar"
            done
          fi

          if [ -d staging/linux-x86_64 ]; then
            tar -czf "release-assets/litergss-linux-x86_64-${VERSION}.tar.gz" -C staging/linux-x86_64 .
          fi

          if [ -d staging/ios ]; then
            # Archive iOS build outputs (excludes xcframework subdir)
            tar -czf "release-assets/litergss-ios-${VERSION}.tar.gz" \
              --exclude='xcframework' -C staging/ios .
          fi

          if [ -d staging/ios/xcframework ]; then
            # ZIP format required for Swift Package Manager binary targets
            cd staging/ios/xcframework
            zip -r "$OLDPWD/release-assets/RubyVM-xcframework-${VERSION}.zip" .
            cd "$OLDPWD"
          fi

          if [ -d staging/macos ]; then
            tar -czf "release-assets/litergss-macos-arm64-${VERSION}.tar.gz" -C staging/macos .
          fi

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: LiteRGSS ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift with XCFramework checksum
        if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.has_ios == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ZIP_FILE="release-assets/RubyVM-xcframework-${VERSION}.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "Warning: XCFramework ZIP not found, skipping Package.swift update"
            exit 0
          fi

          CHECKSUM=$(swift package compute-checksum "$ZIP_FILE" 2>/dev/null \
            || shasum -a 256 "$ZIP_FILE" | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/RubyVM-xcframework-${VERSION}.zip"

          echo "XCFramework URL: $URL"
          echo "XCFramework checksum: $CHECKSUM"

          # Checkout repo to update Package.swift
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" repo-checkout
          cd repo-checkout

          cat > Package.swift <<SWIFT_EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "RubyVM",
              platforms: [
                  .iOS(.v14)
              ],
              products: [
                  .library(name: "RubyVM", targets: ["RubyVM"])
              ],
              targets: [
                  .binaryTarget(
                      name: "RubyVM",
                      url: "$URL",
                      checksum: "$CHECKSUM"
                  )
              ]
          )
          SWIFT_EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: update Package.swift for v${VERSION}"
          git push origin master

      # --- Publish to GitHub Packages (Maven) ---

      - name: Set up JDK
        if: needs.prepare.outputs.has_android == 'true' || needs.prepare.outputs.has_linux_x86_64 == 'true' || needs.prepare.outputs.has_ios == 'true' || needs.prepare.outputs.has_macos == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Write Maven settings
        if: needs.prepare.outputs.has_android == 'true' || needs.prepare.outputs.has_linux_x86_64 == 'true' || needs.prepare.outputs.has_ios == 'true' || needs.prepare.outputs.has_macos == 'true'
        run: |
          cat > /tmp/maven-settings.xml <<SETTINGS_EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          SETTINGS_EOF

      - name: Publish AAR to GitHub Packages
        if: needs.prepare.outputs.has_android == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          AAR_FILE=$(find staging/android-maven -name '*.aar' | head -1)
          POM_FILE=$(find staging/android-maven -name '*.pom' | head -1)

          if [ -z "$AAR_FILE" ]; then
            echo "ERROR: No AAR file found in staging/android-maven"
            exit 1
          fi

          echo "Publishing AAR as com.scorbutics.rubyvm:kmp-publish-android:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-android
            -Dversion="$VERSION"
            -Dpackaging=aar
            -Dfile="$AAR_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      - name: Publish Desktop JAR to GitHub Packages (Linux)
        if: needs.prepare.outputs.has_linux_x86_64 == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          JAR_FILE=$(find staging/linux-x86_64/maven -name '*.jar' ! -name '*-sources.jar' | head -1)
          POM_FILE=$(find staging/linux-x86_64/maven -name '*.pom' | head -1)

          if [ -z "$JAR_FILE" ]; then
            echo "Warning: No Desktop JAR found in staging/linux-x86_64/maven"
            find staging/linux-x86_64/maven -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing Desktop JAR as com.scorbutics.rubyvm:kmp-publish-desktop:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-desktop
            -Dversion="$VERSION"
            -Dpackaging=jar
            -Dfile="$JAR_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      - name: Publish Linux Native klib to GitHub Packages
        if: needs.prepare.outputs.has_linux_x86_64 == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          KLIB_FILE=$(find staging/linux-x86_64/maven-native -name '*.klib' | head -1)
          POM_FILE=$(find staging/linux-x86_64/maven-native -name '*.pom' | head -1)

          if [ -z "$KLIB_FILE" ]; then
            echo "Warning: No Linux Native klib found in staging/linux-x86_64/maven-native"
            find staging/linux-x86_64/maven-native -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing Linux Native klib as com.scorbutics.rubyvm:kmp-publish-linuxx64:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-linuxx64
            -Dversion="$VERSION"
            -Dpackaging=klib
            -Dfile="$KLIB_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      - name: Publish Desktop JAR to GitHub Packages (macOS)
        if: needs.prepare.outputs.has_macos == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          JAR_FILE=$(find staging/macos/maven -name '*.jar' ! -name '*-sources.jar' | head -1)
          POM_FILE=$(find staging/macos/maven -name '*.pom' | head -1)

          if [ -z "$JAR_FILE" ]; then
            echo "Warning: No Desktop JAR found in staging/macos/maven"
            find staging/macos/maven -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing Desktop JAR as com.scorbutics.rubyvm:kmp-publish-desktop-macos:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-desktop-macos
            -Dversion="$VERSION"
            -Dpackaging=jar
            -Dfile="$JAR_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      # --- iOS + KMP metadata (published from install-ios which runs on macOS) ---

      - name: Publish KMP metadata module to GitHub Packages
        if: needs.prepare.outputs.has_ios == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          # Publish the .module file (Gradle module metadata) — this is the key artifact
          # that enables commonMain dependency resolution across all targets.
          MODULE_FILE=$(find staging/ios/maven-kmp/kmp-publish -name '*.module' | head -1)
          POM_FILE=$(find staging/ios/maven-kmp/kmp-publish -name '*.pom' | head -1)

          if [ -z "$MODULE_FILE" ] || [ -z "$POM_FILE" ]; then
            echo "Warning: KMP metadata not found in staging/ios/maven-kmp/kmp-publish"
            find staging/ios/maven-kmp -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing KMP metadata as com.scorbutics.rubyvm:kmp-publish:${VERSION}"

          mvn deploy:deploy-file \
            -DgroupId=com.scorbutics.rubyvm \
            -DartifactId=kmp-publish \
            -Dversion="$VERSION" \
            -Dpackaging=module \
            -Dfile="$MODULE_FILE" \
            -DpomFile="$POM_FILE" \
            -DrepositoryId=github \
            -Durl="$REPO_URL" \
            --settings /tmp/maven-settings.xml

      - name: Publish iOS arm64 klib to GitHub Packages
        if: needs.prepare.outputs.has_ios == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          KLIB_FILE=$(find staging/ios/maven-kmp/kmp-publish-iosarm64 -name '*.klib' | head -1)
          POM_FILE=$(find staging/ios/maven-kmp/kmp-publish-iosarm64 -name '*.pom' | head -1)

          if [ -z "$KLIB_FILE" ]; then
            echo "Warning: No iOS arm64 klib found"
            find staging/ios/maven-kmp -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing iOS arm64 klib as com.scorbutics.rubyvm:kmp-publish-iosarm64:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-iosarm64
            -Dversion="$VERSION"
            -Dpackaging=klib
            -Dfile="$KLIB_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      - name: Publish iOS simulator arm64 klib to GitHub Packages
        if: needs.prepare.outputs.has_ios == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          KLIB_FILE=$(find staging/ios/maven-kmp/kmp-publish-iossimulatorarm64 -name '*.klib' | head -1)
          POM_FILE=$(find staging/ios/maven-kmp/kmp-publish-iossimulatorarm64 -name '*.pom' | head -1)

          if [ -z "$KLIB_FILE" ]; then
            echo "Warning: No iOS simulator arm64 klib found"
            find staging/ios/maven-kmp -type f 2>/dev/null
            exit 0
          fi

          echo "Publishing iOS simulator arm64 klib as com.scorbutics.rubyvm:kmp-publish-iossimulatorarm64:${VERSION}"

          DEPLOY_ARGS=(
            -DgroupId=com.scorbutics.rubyvm
            -DartifactId=kmp-publish-iossimulatorarm64
            -Dversion="$VERSION"
            -Dpackaging=klib
            -Dfile="$KLIB_FILE"
            -DrepositoryId=github
            -Durl="$REPO_URL"
          )
          if [ -n "$POM_FILE" ]; then
            DEPLOY_ARGS+=(-DpomFile="$POM_FILE")
          else
            DEPLOY_ARGS+=(-DgeneratePom=true)
          fi

          mvn deploy:deploy-file "${DEPLOY_ARGS[@]}" --settings /tmp/maven-settings.xml

      - name: Publish iOS native libraries to GitHub Packages
        if: needs.prepare.outputs.has_ios == 'true'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO_URL="https://maven.pkg.github.com/${{ github.repository }}"

          for native_zip in staging/ios/native-ios/*.zip; do
            [ -f "$native_zip" ] || continue
            ARTIFACT_ID=$(basename "$native_zip" .zip)

            echo "Publishing $ARTIFACT_ID native library"

            mvn deploy:deploy-file \
              -DgroupId=com.scorbutics.rubyvm \
              -DartifactId="$ARTIFACT_ID" \
              -Dversion="$VERSION" \
              -Dpackaging=zip \
              -Dfile="$native_zip" \
              -DgeneratePom=true \
              -DrepositoryId=github \
              -Durl="$REPO_URL" \
              --settings /tmp/maven-settings.xml
          done
